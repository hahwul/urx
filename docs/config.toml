# =============================================================================
# Site Configuration
# =============================================================================

title = "Urx"
description = "Extracts URLs from OSINT Archives for Security Insights"
base_url = "" #"https://urx.hahwul.com"

# =============================================================================
# Plugins
# =============================================================================

[plugins]
processors = ["markdown"]

# =============================================================================
# Content Files
# =============================================================================

[content.files]
allow_extensions = ["jpg", "jpeg", "png", "gif", "svg", "webp"]

# =============================================================================
# Syntax Highlighting
# =============================================================================

[highlight]
enabled = true
theme = "github"
use_cdn = true

# =============================================================================
# OpenGraph & Twitter Cards
# =============================================================================

[og]
default_image = "/images/preview.jpg"
type = "website"
twitter_card = "summary_large_image"
twitter_site = "@hahwul"
twitter_creator = "@hahwul"

# =============================================================================
# Search Configuration
# =============================================================================

[search]
enabled = true
format = "fuse_json"
fields = ["title", "content"]
filename = "search.json"
exclude = []

# =============================================================================
# SEO: Sitemap
# =============================================================================

[sitemap]
enabled = true
filename = "sitemap.xml"
changefreq = "weekly"
priority = 0.5
exclude = []

# =============================================================================
# SEO: Robots.txt
# =============================================================================

[robots]
enabled = true
filename = "robots.txt"
rules = [
  { user_agent = "*", disallow = [] },
  { user_agent = "GPTBot", disallow = ["/"] }
]

# =============================================================================
# SEO: LLMs.txt
# =============================================================================

[llms]
enabled = true
filename = "llms.txt"
instructions = "This is the documentation for Urx, a URL extraction tool for OSINT."
full_enabled = false
full_filename = "llms-full.txt"

# =============================================================================
# RSS/Atom Feeds
# =============================================================================

[feeds]
enabled = false

# =============================================================================
# Markdown Configuration
# =============================================================================

[markdown]
safe = false
lazy_loading = false
